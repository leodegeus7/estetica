<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background rounded rect -->
  <rect width="100" height="100" rx="18" fill="#1B4B56"/>

  <!-- Letter M - bold, centered -->
  <text
    x="50" y="68"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-weight="700"
    font-size="58"
    fill="#FFFFFF"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-2"
  >M</text>

  <!-- Accent bar below M -->
  <rect x="22" y="74" width="56" height="5" rx="2.5" fill="#368e99"/>

  <!-- Sparkle dots (top right) -->
  <circle cx="76" cy="18" r="3.5" fill="#a8d8df"/>
  <circle cx="83" cy="27" r="2" fill="#a8d8df"/>
  <circle cx="68" cy="13" r="2.5" fill="#a8d8df"/>
</svg>
